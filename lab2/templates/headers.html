{% extends 'base.html' %}
{% block title %}Заголовки запроса{% endblock %}
{% block content %}
<h1>Заголовки запроса</h1>
<p class="text-muted">Все HTTP-заголовки текущего запроса.</p>

<table class="table table-bordered">
    <thead class="table-dark">
        <tr><th>Заголовок</th><th>Значение</th></tr>
    </thead>
    <tbody>
        {% for name, value in headers.items() %}
        <tr>
            <td>{{ name }}</td>
            <td>{{ value }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
