{% extends "base.html" %}
{% from "macros.html" import render_field %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2>Вход в систему</h2>
        <form method="POST">
            {{ form.hidden_tag() }}
            {{ render_field(form.login) }}
            {{ render_field(form.password) }}
            {{ form.submit(class="btn btn-primary") }}
        </form>
    </div>
</div>
{% endblock %}
