{% extends "base.html" %}

{% block content %}
<h2>Отчёт по пользователям</h2>

<p><a href="{{ url_for('reports.index') }}">&larr; Назад к журналу</a></p>

<table>
    <tr>
        <th>№</th>
        <th>Пользователь</th>
        <th>Количество посещений</th>
    </tr>
    {% for name, cnt in items %}
        <tr>
            <td>{{ loop.index }}</td>
            <td>{{ name }}</td>
            <td>{{ cnt }}</td>
        </tr>
    {% else %}
        <tr><td colspan="3">Данных нет.</td></tr>
    {% endfor %}
</table>

<br>
<a href="{{ url_for('reports.by_users_export') }}">
    <button>Экспорт в CSV</button>
</a>

{% endblock %}
